apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpromc
  labels:
    app: vpromc
spec:
  replicas: {{ .Values.memcached.replicas }}
  selector:
    matchLabels:
      app: vpromc
  template:
    metadata:
      labels:
        app: vpromc
    spec:
      containers:
        - name: vpromc
          image: {{ .Values.memcached.image }}:{{ .Values.memcached.tag }}
          ports:
            - name: vpromc-port
              containerPort: {{ .Values.memcached.containerPort }}
