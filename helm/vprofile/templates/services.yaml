apiVersion: v1
kind: Service
metadata:
  name: vproapp-service
spec:
  ports:
    - port: {{ .Values.app.servicePort }}
      protocol: TCP
      targetPort: {{ .Values.app.containerPort }}
  selector:
    app: vproapp
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: vprodb
spec:
  ports:
    - port: {{ .Values.db.servicePort }}
      targetPort: vprodb-port
      protocol: TCP
  selector:
    app: vprodb
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: vprocache01
spec:
  ports:
    - port: {{ .Values.memcached.servicePort }}
      targetPort: vpromc-port
      protocol: TCP
  selector:
    app: vpromc
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: vpromq01
spec:
  ports:
    - port: {{ .Values.rabbitmq.servicePort }}
      targetPort: vpromq01-port
      protocol: TCP
  selector:
    app: vpromq01
  type: ClusterIP
